<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Online Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
    }
    .search-box {
      padding: 8px;
      border-radius: 4px;
      border: none;
      width: 200px;
    }
    .cart {
      cursor: pointer;
      font-weight: bold;
    }
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .product {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }
    .price {
      color: green;
      font-weight: bold;
      margin: 5px 0;
    }
    button {
      background: #3498db;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #2980b9;
    }
    #cartBox {
      position: fixed;
      top: 0;
      right: -350px;
      width: 300px;
      height: 100%;
      background: #fff;
      box-shadow: -2px 0 8px rgba(0,0,0,0.2);
      padding: 15px;
      transition: 0.3s;
      overflow-y: auto;
    }
    #cartBox.active {
      right: 0;
    }
    footer {
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Shop</h1>
  <input type="text" id="search" class="search-box" placeholder="Search products" />
  <div class="cart" onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</div>
</header>

<div class="container" id="productList">
  <!-- Products -->
</div>

<div id="cartBox">
  <h2>My Cart</h2>
  <ul id="cartItems"></ul>
  <p><strong>Total: ₹<span id="total">0</span></strong></p>
  <button onclick="toggleCart()">Close</button>
</div>

<footer>
  <p>© 2026 My Shop | Simple Online Store</p>
</footer>

<script>
  const products = [
    {name: 'Rice 1kg', price: 60},
    {name: 'Wheat Flour', price: 45},
    {name: 'Sugar 1kg', price: 50},
    {name: 'Cooking Oil', price: 120},
    {name: 'Tea Powder', price: 90},
    {name: 'Coffee', price: 150},
    {name: 'Biscuits', price: 30},
    {name: 'Soap', price: 25}
  ];

  let cart = [];

  const productList = document.getElementById('productList');

  function displayProducts(list) {
    productList.innerHTML = '';
    list.forEach(p => {
      productList.innerHTML += `
        <div class="product">
          <img src="https://via.placeholder.com/300x150" />
          <h3>${p.name}</h3>
          <p class="price">₹${p.price}</p>
          <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
        </div>`;
    });
  }

  function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
  }

  function updateCart() {
    const cartItems = document.getElementById('cartItems');
    cartItems.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
      total += item.price;
      cartItems.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
    });
    document.getElementById('total').innerText = total;
    document.getElementById('cartCount').innerText = cart.length;
  }

  function toggleCart() {
    document.getElementById('cartBox').classList.toggle('active');
  }

  document.getElementById('search').addEventListener('input', e => {
    const value = e.target.value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(value));
    displayProducts(filtered);
  });

  displayProducts(products);
</script>

</body>
</html>
