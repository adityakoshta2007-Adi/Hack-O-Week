<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced To-Do List</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
}

.container{
width:430px;
background:#1e1e1e;
padding:30px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.9);
}

h1{
text-align:center;
margin-bottom:20px;
}

.inputBox{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#2c2c2c;
color:white;
outline:none;
}

button{
padding:12px 15px;
border:none;
border-radius:8px;
background:#00c896;
color:white;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#00a87f;
}

ul{
list-style:none;
max-height:280px;
overflow-y:auto;
}

li{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
margin-bottom:10px;
background:#2c2c2c;
border-radius:8px;
}

.task{
flex:1;
margin-left:10px;
}

.completed{
text-decoration:line-through;
color:#888;
}

.deleteBtn{
background:#ff4d4d;
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

.deleteBtn:hover{
background:#e60000;
}

.stats{
margin-top:15px;
font-size:14px;
color:#bbb;
display:flex;
justify-content:space-between;
}

.percent{
margin-top:8px;
font-size:14px;
color:#00c896;
text-align:center;
}

.progressBar{
height:7px;
background:#333;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#00c896;
transition:0.3s;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ Smart To-Do List</h1>

<div class="inputBox">
<input id="taskInput" placeholder="Add a new task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="stats">
<span id="total">0 Tasks</span>
<span id="completed">0 Done</span>
</div>

<div class="percent" id="percentText">
0% Completed
</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(){

let list=document.getElementById("taskList");
list.innerHTML="";

let completedCount=0;

tasks.forEach((task,index)=>{

let li=document.createElement("li");

let checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=task.completed;

checkbox.onchange=function(){
tasks[index].completed=!tasks[index].completed;
saveTasks();
renderTasks();
}

let span=document.createElement("span");
span.textContent=task.text;
span.className="task";

if(task.completed){
span.classList.add("completed");
completedCount++;
}

let deleteBtn=document.createElement("button");
deleteBtn.textContent="Delete";
deleteBtn.className="deleteBtn";

deleteBtn.onclick=function(){
tasks.splice(index,1);
saveTasks();
renderTasks();
}

li.appendChild(checkbox);
li.appendChild(span);
li.appendChild(deleteBtn);

list.appendChild(li);

});

document.getElementById("total").textContent=tasks.length+" Tasks";
document.getElementById("completed").textContent=completedCount+" Done";

let percent = tasks.length ? Math.round((completedCount/tasks.length)*100) : 0;

document.getElementById("percentText").textContent = percent + "% Completed";
document.getElementById("progress").style.width = percent + "%";

}

function addTask(){

let input=document.getElementById("taskInput");
let text=input.value.trim();

if(text==="") return;

tasks.push({
text:text,
completed:false
});

input.value="";

saveTasks();
renderTasks();

}

document.getElementById("taskInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
addTask();
}
});

renderTasks();

</script>

</body>
</html>
